<!DOCTYPE html>
<html>
<head>
    <title>IPL Win Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            margin-top: 50px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            font-weight: bold;
            margin-bottom: 30px;
        }
        .btn-custom {
            width: 200px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1 class="text-center">IPL Win Predictor</h1>

        <form method="POST">

            <div class="row mb-3">
                <div class="col">
                    <label>Select the batting team</label>
                    <select name="batting_team" class="form-control">
                        {% for team in teams %}
                        <option value="{{team}}">{{team}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col">
                    <label>Select the bowling team</label>
                    <select name="bowling_team" class="form-control">
                        {% for team in teams %}
                        <option value="{{team}}">{{team}}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Select host city</label>
                <select name="city" class="form-control">
                    {% for city in cities %}
                    <option value="{{city}}">{{city}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label>Target</label>
                <input type="number" name="target" class="form-control" required>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label>Score</label>
                    <input type="number" name="score" class="form-control" required>
                </div>

                <div class="col">
                    <label>Overs completed</label>
                    <input type="number" step="0.1" name="overs" class="form-control" required>
                </div>

                <div class="col">
                    <label>Wickets out</label>
                    <input type="number" name="wickets" class="form-control" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-custom">
                    Predict Probability
                </button>
            </div>

        </form>

        {% if win %}
        <div class="text-center mt-4">
            <h4>{{batting_team}} : {{win}}%</h4>
            <h4>{{bowling_team}} : {{loss}}%</h4>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
